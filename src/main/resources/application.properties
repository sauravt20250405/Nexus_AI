# Spring Boot Configuration
spring.application.name=Nexus RAG
server.port=8080

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3307/nexus_rag?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# LangChain4j: OpenAI Integration
langchain4j.open-ai.chat-model.api-key=${OPENAI_API_KEY}
langchain4j.open-ai.chat-model.model-name=gpt-4-turbo
langchain4j.open-ai.chat-model.temperature=0.7

langchain4j.open-ai.embedding-model.api-key=${OPENAI_API_KEY}
langchain4j.open-ai.embedding-model.model-name=text-embedding-3-small

# LangChain4j: ChromaDB (Local)
langchain4j.chroma.url=http://localhost:8000
langchain4j.chroma.collection-name=university_knowledge

# Logging
logging.level.dev.langchain4j=DEBUG
logging.level.com.nexusrag=INFO
