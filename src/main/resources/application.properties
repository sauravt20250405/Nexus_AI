# Spring Boot Configuration
spring.application.name=Nexus RAG
server.port=8080

# Database Configuration (Docker Bypass - In-Memory H2)
spring.datasource.url=jdbc:h2:mem:nexus_rag;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# LangChain4j: OpenAI Integration
langchain4j.open-ai.chat-model.api-key=${OPENAI_API_KEY}
langchain4j.open-ai.chat-model.model-name=gpt-3.5-turbo
langchain4j.open-ai.chat-model.temperature=0.7

# Embedding: Using local BGE model (no API key required)
# langchain4j.open-ai.embedding-model.api-key=${OPENAI_API_KEY:demo}
# langchain4j.open-ai.embedding-model.model-name=text-embedding-ada-002

# LangChain4j: Ollama Integration (Local Model Support)
langchain4j.ollama.chat-model.base-url=http://localhost:11434
langchain4j.ollama.chat-model.model-name=llama3
langchain4j.ollama.chat-model.temperature=0.7

# LangChain4j: ChromaDB (Local Docker) - DISABLED for In-Memory Architecture bypass
# langchain4j.chroma.url=http://localhost:8000
# langchain4j.chroma.collection-name=university_knowledge

# Logging
logging.level.dev.langchain4j=DEBUG
logging.level.com.nexusrag=INFO

# Nexus RAG Configuration
nexus.rag.query-expansion-prompt=You are a Query Expansion Agent. Rewrite the following user query for a university assistant to be more precise for vector search. Think about synonyms for university terms (e.g. 'admission' -> 'enrollment', 'scholarship' -> 'financial aid'). Original: %s
nexus.rag.retrieval-limit=20

# Cohere Re-ranking
langchain4j.cohere.api-key=${COHERE_API_KEY}
