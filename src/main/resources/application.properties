# Spring Boot Configuration
spring.application.name=Nexus AI
server.port=8080
spring.main.allow-bean-definition-overriding=true

# Database Configuration (Docker Bypass - In-Memory H2)
spring.datasource.url=jdbc:h2:mem:nexus_rag;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# LangChain4j: OpenAI Integration
langchain4j.open-ai.chat-model.api-key=REPLACE_WITH_OPENAI_KEY
langchain4j.open-ai.chat-model.model-name=gpt-3.5-turbo
langchain4j.open-ai.chat-model.temperature=0.7


# LangChain4j: Ollama Integration (Local Model Support)
langchain4j.ollama.chat-model.base-url=http://localhost:11434
langchain4j.ollama.chat-model.model-name=llama3.1
langchain4j.ollama.chat-model.temperature=0.7


# Server Configuration: Async request timeout (10 minutes)
spring.mvc.async.request-timeout=600000

# File Upload Limits
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Logging
logging.level.dev.langchain4j=DEBUG
logging.level.com.nexusrag=INFO

# Gemini Integration
langchain4j.gemini.chat-model.api-key=REPLACE_WITH_GEMINI_KEY
langchain4j.gemini.chat-model.model-name=gemini-flash-latest
